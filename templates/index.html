<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ChoreWars</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');

    :root {
      --bg-a: #1e1254;
      --bg-b: #2d1b69;
      --bg-c: #4a2d8a;
      --glass: rgba(255,255,255,0.10);
      --glass-b: rgba(255,255,255,0.18);
      --text: #f0e6ff;
      --muted: rgba(255,255,255,0.55);
      --radius: 22px;
      --mg-a: #6d1fa8;
      --mg-b: #c026d3;
      --jc-a: #1e3a8a;
      --jc-b: #2563eb;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(160deg, var(--bg-a), var(--bg-b), var(--bg-c));
      height: 100dvh;
      width: 100vw;
      color: var(--text);
      display: flex;
      flex-direction: column;
      padding: 12px 14px 14px;
      gap: 10px;
      overflow: hidden;
    }

    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.30;
      pointer-events: none;
      z-index: 0;
    }
    body::before { width: 260px; height: 260px; background: #a855f7; top: -90px; left: -90px; }
    body::after  { width: 220px; height: 220px; background: #2563eb; bottom: -70px; right: -70px; }

    .frame {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      gap: 10px;
      position: relative;
      z-index: 1;
    }
    .hidden { display: none !important; }

    /* ============================================================
       HEADER
    ============================================================ */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      height: 72px;
    }
    .header-left  { display: flex; align-items: center; gap: 8px; }
    .header-right { display: flex; align-items: center; gap: 8px; }

    .date-label {
      font-weight: 900;
      font-size: min(6.2vw, 4.3vh);
      background: linear-gradient(90deg, #c084fc, #f9a8d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.02em;
    }

    .date-block { display: flex; flex-direction: column; gap: 1px; }
    .time-label {
      font-size: min(4vw, 2.8vh);
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .chore-header-label {
      font-size: min(4.5vw, 3.2vh);
      font-weight: 900;
      color: var(--text);
    }

    .icon-btn {
      background: var(--glass);
      border: 1px solid var(--glass-b);
      border-radius: 16px;
      width: min(30vw, 20vh);
      height: min(20vw, 10vh);
      min-width: 68px;
      min-height: 68px;
      font-size: min(8vw, 5.5vh);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      color: var(--text);
    }
    .icon-btn:active { background: rgba(255,255,255,0.20); }

    .btn-back {
      background: var(--glass);
      border: 1px solid var(--glass-b);
      border-radius: 16px;
      width: min(18vw, 12vh);
      height: min(14vw, 10vh);
      min-width: 56px;
      min-height: 56px;
      font-size: min(6vw, 4.2vh);
      font-weight: 900;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      color: var(--text);
    }
    .btn-back:active { background: rgba(255,255,255,0.20); }

    .icon-star { color: #fbbf24; font-style: normal; font-size: min(8.5vw, 5.8vh); }

    .avatar-chip {
      width: min(10vw, 7vh);
      height: min(10vw, 7vh);
      min-width: 36px;
      min-height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: min(4.5vw, 3.2vh);
      font-weight: 900;
      color: #fff;
      flex-shrink: 0;
    }
    .chip-mg { background: linear-gradient(135deg, var(--mg-a), var(--mg-b)); }
    .chip-jc { background: linear-gradient(135deg, var(--jc-a), var(--jc-b)); }

    /* ============================================================
       WEEKLY STRIP (Frame 0)
    ============================================================ */
    .weekly-strip {
      display: flex;
      gap: 10px;
      flex-shrink: 0;
      height: 60px;
    }

    .score-card {
      flex: 1;
      background: var(--glass);
      border: 1px solid var(--glass-b);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .score-name  { font-size: min(5.2vw, 3.6vh); font-weight: 900; color: var(--text); }
    .score-divider { width: 1px; height: 22px; background: var(--glass-b); }
    .score-count { font-size: min(6.8vw, 4.8vh); font-weight: 900; color: #fff; }
    .score-label { font-size: min(3.2vw, 2.2vh); font-weight: 700; color: var(--muted); }

    /* ============================================================
       FRAME 0 — Chore Grid
    ============================================================ */
    .chore-grid {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      min-height: 0;
    }

    .btn-chore {
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      padding: 8px 6px;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      transition: transform 0.12s cubic-bezier(.34,1.56,.64,1);
      overflow: hidden;
      position: relative;
    }
    .btn-chore:active { transform: scale(0.95); }

    .chore-emoji      { font-size: min(11vw, 7vh); line-height: 1; }
    .chore-done-hero  { font-size: min(9vw, 6vh); font-weight: 900; color: #4ade80; line-height: 1; letter-spacing: 0.02em; }
    .chore-name       { font-size: min(4.5vw, 3vh); font-weight: 900; color: #fff; }
    .chore-week-count { font-size: min(3.6vw, 2.5vh); font-weight: 700; color: rgba(255,255,255,0.65); }

    /* ============================================================
       TAB BAR
    ============================================================ */
    .tab-bar {
      display: flex;
      gap: 4px;
      background: rgba(0,0,0,0.25);
      border-radius: 12px;
      padding: 3px;
      flex-shrink: 0;
    }
    .tab-btn {
      flex: 1;
      border: none;
      border-radius: 9px;
      padding: min(1.2vh, 8px) 4px;
      font-family: inherit;
      font-size: min(4vw, 2.8vh);
      font-weight: 900;
      cursor: pointer;
      color: rgba(255,255,255,0.45);
      background: transparent;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      transition: background 0.15s, color 0.15s;
    }
    .tab-btn.tab-active {
      background: rgba(255,255,255,0.15);
      color: #fff;
    }

    .chore-litter   { background: linear-gradient(160deg,#5b21b6,#9333ea); box-shadow: 0 6px 24px rgba(147,51,234,0.38); }
    .chore-dishes   { background: linear-gradient(160deg,#0f766e,#14b8a6); box-shadow: 0 6px 24px rgba(20,184,166,0.38); }
    .chore-laundry  { background: linear-gradient(160deg,#1d4ed8,#3b82f6); box-shadow: 0 6px 24px rgba(59,130,246,0.38); }
    .chore-bathroom { background: linear-gradient(160deg,#3730a3,#6366f1); box-shadow: 0 6px 24px rgba(99,102,241,0.38); }
    .chore-vacuum   { background: linear-gradient(160deg,#92400e,#f59e0b); box-shadow: 0 6px 24px rgba(245,158,11,0.38); }
    .chore-trash    { background: linear-gradient(160deg,#166534,#22c55e); box-shadow: 0 6px 24px rgba(34,197,94,0.38); }
    .chore-patio    { background: linear-gradient(160deg,#854d0e,#ca8a04); box-shadow: 0 6px 24px rgba(202,138,4,0.38); }
    .chore-cooking  { background: linear-gradient(160deg,#9f1239,#f43f5e); box-shadow: 0 6px 24px rgba(244,63,94,0.38); }

    /* ============================================================
       FRAME 1 — Player buttons
    ============================================================ */
    .players {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 0;
    }

    .btn-player {
      flex: 1;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: min(1.6vh, 12px);
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      transition: transform 0.12s cubic-bezier(.34,1.56,.64,1);
      overflow: hidden;
      position: relative;
    }
    .btn-player::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      transition: background 0.15s;
    }
    .btn-player:active { transform: scale(0.96); }
    .btn-player:active::after { background: rgba(255,255,255,0.1); }

    .btn-mg {
      background: linear-gradient(160deg, var(--mg-a), var(--mg-b));
      box-shadow: 0 10px 50px rgba(168,50,230,0.45), 0 2px 8px rgba(0,0,0,0.3);
    }
    .btn-jc {
      background: linear-gradient(160deg, var(--jc-a), var(--jc-b));
      box-shadow: 0 10px 50px rgba(37,99,235,0.45), 0 2px 8px rgba(0,0,0,0.3);
    }

    .player-emoji { font-size: min(19vw, 13vh); line-height: 1; position: relative; z-index: 1; }
    .player-name  { font-size: min(10vw, 7vh); font-weight: 900; color: #fff; letter-spacing: 0.05em; position: relative; z-index: 1; }

    /* ============================================================
       FRAME 2 — Celebration
    ============================================================ */
    .today-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: min(1.4vh, 10px);
      min-height: 0;
    }

    .big-emoji { font-size: min(22vw, 15vh); line-height: 1; }

    .chore-tag {
      font-size: min(5.2vw, 3.6vh);
      font-weight: 800;
      color: rgba(255,255,255,0.72);
      letter-spacing: 0.04em;
    }

    .today-date-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: min(6.5vw, 4.5vh);
      font-weight: 900;
    }

    .check-box {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: min(8vw, 5.5vh);
      height: min(8vw, 5.5vh);
      min-width: 28px;
      min-height: 28px;
      border-radius: 9px;
      background: #16a34a;
      font-size: min(4.5vw, 3vh);
      flex-shrink: 0;
    }

    .winner-name {
      font-size: min(15vw, 10vh);
      font-weight: 900;
      color: #fff;
      letter-spacing: 0.05em;
      line-height: 1;
      text-shadow: 0 0 30px rgba(192,38,211,0.6);
    }

    .streak-line  { font-size: min(5.8vw, 4vh); font-weight: 800; color: var(--text); }
    .monthly-line { font-size: min(5.2vw, 3.6vh); font-weight: 700; color: var(--muted); }

    /* Auto-return countdown bar */
    .return-bar-track {
      height: 4px;
      background: rgba(255,255,255,0.12);
      border-radius: 2px;
      flex-shrink: 0;
      overflow: hidden;
    }
    #return-bar {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #a855f7, #ec4899);
      border-radius: 2px;
    }

    .sad-cat {
      position: absolute;
      bottom: 14px;
      left: 16px;
      font-size: min(13vw, 9vh);
      z-index: 2;
      opacity: 0.85;
      line-height: 1;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .sad-initials { font-size: min(5.8vw, 4vh); font-weight: 900; color: var(--muted); }

    /* ============================================================
       OVERLAYS
    ============================================================ */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      backdrop-filter: blur(7px);
      z-index: 100;
      display: flex;
      align-items: flex-end;
    }
    .overlay.hidden { display: none !important; }

    .overlay-sheet {
      width: 100%;
      background: linear-gradient(180deg, #1a0d3a, #110828);
      border: 1px solid var(--glass-b);
      border-top-left-radius: 26px;
      border-top-right-radius: 26px;
      max-height: 82dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sheet-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px 12px;
      font-size: min(5.5vw, 3.8vh);
      font-weight: 900;
      flex-shrink: 0;
      border-bottom: 1px solid var(--glass-b);
    }

    .close-btn {
      background: var(--glass);
      border: 1px solid var(--glass-b);
      color: var(--text);
      border-radius: 9px;
      width: 12vh;
      height: 8vh;
      font-size: min(5vw, 3.5vh);
      font-weight: 900;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .close-btn:active { background: rgba(255,255,255,0.15); }

    .sheet-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
      -webkit-overflow-scrolling: touch;
    }

    .entry-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 18px;
      font-size: min(4.8vw, 3.4vh);
      font-weight: 700;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .entry-row:last-child { border-bottom: none; }

    .entry-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .dot-mg { background: var(--mg-b); box-shadow: 0 0 6px var(--mg-b); }
    .dot-jc { background: var(--jc-b); box-shadow: 0 0 6px var(--jc-b); }

    .entry-person { font-weight: 900; min-width: min(10vw, 7vh); flex-shrink: 0; }
    .entry-chore  { flex: 1; color: var(--muted); font-size: min(4.4vw, 3.1vh); }
    .entry-date   { color: var(--muted); font-size: min(4.1vw, 2.9vh); flex-shrink: 0; }

    .btn-del {
      background: rgba(220,38,38,0.15);
      border: 1px solid rgba(248,113,113,0.35);
      color: #fff;
      border-radius: 10px;
      width: min(12vw, 8vh);
      height: min(12vw, 8vh);
      min-width: 50px;
      min-height: 50px;
      font-size: min(4.5vw, 3.2vh);
      font-weight: 900;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-del:active { background: rgba(220,38,38,0.32); }

    .month-summary {
      padding: 14px 18px;
      border-bottom: 1px solid var(--glass-b);
      flex-shrink: 0;
    }
    .month-summary-title {
      font-size: min(4.4vw, 3vh);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .month-summary-rows { display: flex; flex-direction: column; gap: 8px; }
    .summary-row { display: flex; align-items: center; gap: 10px; }
    .summary-name  { font-size: min(4.8vw, 3.3vh); font-weight: 900; width: min(10vw, 7vh); flex-shrink: 0; }
    .summary-bar-track { flex: 1; height: 8px; background: rgba(255,255,255,0.08); border-radius: 4px; overflow: hidden; }
    .summary-bar   { height: 100%; border-radius: 4px; transition: width 0.5s cubic-bezier(.4,0,.2,1); }
    .bar-mg { background: linear-gradient(90deg, var(--mg-a), var(--mg-b)); }
    .bar-jc { background: linear-gradient(90deg, var(--jc-a), var(--jc-b)); }
    .summary-count { font-size: min(4.8vw, 3.3vh); font-weight: 900; width: min(10vw, 7vh); text-align: right; flex-shrink: 0; }

    .sheet-footer {
      padding: 12px 18px 14px;
      border-top: 1px solid var(--glass-b);
      flex-shrink: 0;
    }
    .btn-reset-all {
      width: 100%;
      height: 10vh;
      background: rgba(220,38,38,0.10);
      border: 1px solid rgba(248,113,113,0.30);
      color: rgba(255,140,140,0.9);
      border-radius: 14px;
      font-family: inherit;
      font-size: min(4.2vw, 3vh);
      font-weight: 800;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-reset-all:active { background: rgba(220,38,38,0.22); }

    /* ============================================================
       CONFIRM MODAL
    ============================================================ */
    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(7px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px;
    }
    .modal-bg.hidden { display: none !important; }

    .modal {
      background: #1c0e3e;
      border: 1px solid var(--glass-b);
      border-radius: 22px;
      padding: min(4vh, 26px) min(5vw, 22px);
      width: 100%;
      max-width: 360px;
      text-align: center;
    }
    .modal h2 { font-size: min(5.5vw, 3.8vh); font-weight: 900; margin-bottom: 8px; }
    .modal p  { font-size: min(4vw, 2.8vh); color: var(--muted); font-weight: 700; margin-bottom: min(3vh, 20px); line-height: 1.5; }
    .modal-btns { display: flex; gap: 10px; }
    .modal-btns button {
      flex: 1;
      border: none;
      border-radius: 14px;
      height: 10vh;
      font-family: inherit;
      font-size: min(4.5vw, 3vh);
      font-weight: 900;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-cancel  { background: var(--glass); color: var(--text); border: 1px solid var(--glass-b) !important; }
    .btn-confirm { background: linear-gradient(135deg, #dc2626, #f87171); color: #fff; }

    /* ============================================================
       HABIT BUTTON COLORS
    ============================================================ */
    .habit-run     { background: linear-gradient(160deg,#065f46,#10b981); box-shadow: 0 6px 24px rgba(16,185,129,0.38); }
    .habit-yoga    { background: linear-gradient(160deg,#4c1d95,#8b5cf6); box-shadow: 0 6px 24px rgba(139,92,246,0.38); }
    .habit-weights { background: linear-gradient(160deg,#7c2d12,#f97316); box-shadow: 0 6px 24px rgba(249,115,22,0.38); }
    .habit-sports  { background: linear-gradient(160deg,#1e3a8a,#3b82f6); box-shadow: 0 6px 24px rgba(59,130,246,0.38); }
    .habit-read    { background: linear-gradient(160deg,#713f12,#eab308); box-shadow: 0 6px 24px rgba(234,179,8,0.38); }
    .habit-noalc   { background: linear-gradient(160deg,#1f2937,#6b7280); box-shadow: 0 6px 24px rgba(107,114,128,0.38); }
    .habit-water   { background: linear-gradient(160deg,#0c4a6e,#0ea5e9); box-shadow: 0 6px 24px rgba(14,165,233,0.38); }
    .habit-nojunk  { background: linear-gradient(160deg,#14532d,#86efac); box-shadow: 0 6px 24px rgba(134,239,172,0.38); }

    /* ============================================================
       SLEEP OVERLAY
    ============================================================ */
    #sleep-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 10000;
      overflow: hidden;
    }
    #sleep-overlay.show { display: block; }

    #sleep-day {
      position: absolute;
      inset: 0;
      background: rgba(12, 6, 30, 0.90);
    }

    #sleep-night {
      position: absolute;
      inset: 0;
      background: rgba(3, 1, 8, 0.97);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .sleep-time-night {
      font-size: min(22vw, 15vh);
      font-weight: 900;
      color: rgba(255,255,255,0.10);
      letter-spacing: 0.05em;
      line-height: 1;
      text-align: center;
    }
    .sleep-date-night {
      font-size: min(4.5vw, 3.2vh);
      font-weight: 700;
      color: rgba(255,255,255,0.07);
      text-align: center;
      margin-top: 8px;
    }

    .bounce-emoji {
      position: absolute;
      font-size: min(12vw, 8vh);
      opacity: 0.45;
      line-height: 1;
      pointer-events: none;
      user-select: none;
    }

    /* ============================================================
       TOAST + CONFETTI
    ============================================================ */
    #toast {
      position: fixed;
      bottom: min(3vh, 22px);
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: linear-gradient(135deg, #7c3aed, #db2777);
      color: #fff;
      padding: min(1.5vh, 10px) min(5.5vw, 24px);
      border-radius: 30px;
      font-family: inherit;
      font-weight: 800;
      font-size: min(4vw, 2.8vh);
      box-shadow: 0 8px 30px rgba(124,58,237,0.5);
      transition: transform 0.35s cubic-bezier(.34,1.56,.64,1);
      pointer-events: none;
      z-index: 9999;
      white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    .confetti-piece {
      position: fixed;
      border-radius: 2px;
      pointer-events: none;
      z-index: 9998;
      animation: cfall 0.9s ease-in forwards;
    }
    @keyframes cfall {
      0%   { opacity: 1; transform: translateY(0) rotate(0deg); }
      100% { opacity: 0; transform: translateY(220px) rotate(720deg); }
    }

    /* ============================================================
       ATTENTION INDICATOR
    ============================================================ */
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 0 2px rgba(239,68,68,0.6), 0 0 18px rgba(239,68,68,0.4); }
      50%       { box-shadow: 0 0 0 3px rgba(239,68,68,0.9), 0 0 30px rgba(239,68,68,0.65); }
    }
    .alert-glow {
      animation: pulseGlow 1.8s ease-in-out infinite;
      outline: 2px solid rgba(239,68,68,0.7);
    }
    .days-chip {
      position: absolute;
      top: 7px;
      right: 7px;
      background: rgba(239,68,68,0.92);
      color: #fff;
      font-size: min(2.8vw, 1.8vh);
      font-weight: 900;
      border-radius: 8px;
      padding: 2px 6px;
      line-height: 1.4;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- ============================================================
       FRAME 0 — Home (chore grid)
  ============================================================ -->
  <div id="frame-home" class="frame">
    <div class="tab-bar">
      <button class="tab-btn tab-active" data-tab="chores" onclick="switchTab('chores')">🏠 Chores</button>
      <button class="tab-btn" data-tab="habits" onclick="switchTab('habits')">🌱 Habits</button>
    </div>
    <div class="header">
      <div class="date-block">
        <div class="date-label" id="hdr-date-home"></div>
        <div class="time-label" id="hdr-time-home"></div>
      </div>
      <div class="header-right">
        <button class="icon-btn" onclick="openTrophyForTab()"><i class="icon-star">&#9733;</i></button>
        <button class="icon-btn" onclick="openSettingsForTab()">&#9881;&#65039;</button>
      </div>
    </div>
    <div class="weekly-strip">
      <div class="score-card">
        <div>
          <div class="score-name">{{ player1 }}</div>
          <div class="score-label">this week</div>
        </div>
        <div class="score-divider"></div>
        <div class="score-count" id="score-p1">0</div>
      </div>
      <div class="score-card">
        <div>
          <div class="score-name">{{ player2 }}</div>
          <div class="score-label">this week</div>
        </div>
        <div class="score-divider"></div>
        <div class="score-count" id="score-p2">0</div>
      </div>
    </div>
    <div class="chore-grid" id="chore-grid"></div>
  </div>

  <!-- ============================================================
       FRAME 1 — Player select
  ============================================================ -->
  <div id="frame-select" class="frame hidden">
    <div class="header">
      <div class="header-left">
        <button class="btn-back" onclick="showHome()">&#8592;</button>
        <div class="date-block">
          <div class="date-label" id="hdr-date-select"></div>
          <div class="time-label" id="hdr-time-select"></div>
        </div>
      </div>
      <div class="header-right">
        <div class="chore-header-label" id="chore-header-label"></div>
      </div>
    </div>
    <div class="players">
      <button class="btn-player btn-mg" onclick="recordClean('{{ player2 }}', this)">
        <span class="player-emoji">&#128568;</span>
        <span class="player-name">{{ player2 }}</span>
      </button>
      <button class="btn-player btn-jc" onclick="recordClean('{{ player1 }}', this)">
        <span class="player-emoji">&#128572;</span>
        <span class="player-name">{{ player1 }}</span>
      </button>
    </div>
  </div>

  <!-- ============================================================
       FRAME 2 — Celebration
  ============================================================ -->
  <div id="frame-today" class="frame hidden">
    <div class="header">
      <button class="btn-back" onclick="goHome()">&#8592;</button>
      <div class="header-right">
        <button class="icon-btn" onclick="openTrophy()"><i class="icon-star">&#9733;</i></button>
        <button class="icon-btn" onclick="openSettings()">&#9881;&#65039;</button>
        <div class="avatar-chip" id="avatar-chip"></div>
      </div>
    </div>
    <div class="today-body">
      <div class="big-emoji">&#128571;</div>
      <div class="chore-tag" id="chore-tag"></div>
      <div class="today-date-row">
        <span id="today-date-txt"></span>
        <span class="check-box">&#10003;</span>
      </div>
      <div class="winner-name" id="winner-name"></div>
      <div class="streak-line" id="streak-line"></div>
      <div class="monthly-line" id="monthly-line"></div>
    </div>
    <div class="return-bar-track"><div id="return-bar"></div></div>
    <div class="sad-cat">&#128575; <span id="sad-initials" class="sad-initials"></span></div>
  </div>

  <!-- ============================================================
       TROPHY OVERLAY
  ============================================================ -->
  <div id="overlay-trophy" class="overlay hidden">
    <div class="overlay-sheet">
      <div class="sheet-header">
        <span>&#9733; History</span>
        <button class="close-btn" onclick="closeOverlay('overlay-trophy')">X</button>
      </div>
      <div class="month-summary" id="trophy-summary"></div>
      <div class="sheet-list" id="trophy-list"></div>
    </div>
  </div>

  <!-- ============================================================
       SETTINGS OVERLAY
  ============================================================ -->
  <div id="overlay-settings" class="overlay hidden">
    <div class="overlay-sheet">
      <div class="sheet-header">
        <span>&#9881; Settings</span>
        <button class="close-btn" onclick="closeOverlay('overlay-settings')">X</button>
      </div>
      <div class="sheet-list" id="settings-list"></div>
      <div class="sheet-footer">
        <button class="btn-reset-all" onclick="confirmReset()">Reset all scores</button>
      </div>
    </div>
  </div>

  <!-- ============================================================
       HABIT TROPHY OVERLAY
  ============================================================ -->
  <div id="overlay-habit-trophy" class="overlay hidden">
    <div class="overlay-sheet">
      <div class="sheet-header">
        <span>&#9733; Habit History</span>
        <button class="close-btn" onclick="closeOverlay('overlay-habit-trophy')">X</button>
      </div>
      <div class="month-summary" id="habit-trophy-summary"></div>
      <div class="sheet-list" id="habit-trophy-list"></div>
    </div>
  </div>

  <!-- ============================================================
       HABIT SETTINGS OVERLAY
  ============================================================ -->
  <div id="overlay-habit-settings" class="overlay hidden">
    <div class="overlay-sheet">
      <div class="sheet-header">
        <span>&#9881; Habit Settings</span>
        <button class="close-btn" onclick="closeOverlay('overlay-habit-settings')">X</button>
      </div>
      <div class="sheet-list" id="habit-settings-list"></div>
      <div class="sheet-footer">
        <button class="btn-reset-all" onclick="confirmHabitReset()">Reset all habits</button>
      </div>
    </div>
  </div>

  <!-- ============================================================
       CONFIRM MODAL
  ============================================================ -->
  <div id="modal-confirm" class="modal-bg hidden">
    <div class="modal">
      <h2>Reset everything?</h2>
      <p id="modal-confirm-text">All chore records will be deleted permanently.</p>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeConfirm()">Cancel</button>
        <button class="btn-confirm" onclick="doReset()">Yes, reset</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <!-- ============================================================
       SLEEP OVERLAY
  ============================================================ -->
  <div id="sleep-overlay">
    <div id="sleep-day"></div>
    <div id="sleep-night" style="display:none">
      <div>
        <div class="sleep-time-night" id="sleep-time-night">00:00</div>
        <div class="sleep-date-night" id="sleep-date-night"></div>
      </div>
    </div>
  </div>

  <script>
    const P1 = "{{ player1 }}";
    const P2 = "{{ player2 }}";
    const CHORES = {{ chores | safe }};
    const CONFETTI_COLORS = ["#a855f7","#f472b6","#818cf8","#34d399","#fbbf24","#f87171","#60a5fa"];

    // Chores that can be logged multiple times per day
    const MULTI_PER_DAY = new Set(["Dishes", "Laundry", "Trash", "Cooking"]);

    // Days threshold before showing attention indicator
    const CHORE_THRESHOLDS = { "Litter Box": 3, "Vacuum": 3, "Bathroom": 7 };

    const CHORE_CSS = {
      "Litter Box": "chore-litter",
      "Dishes":     "chore-dishes",
      "Laundry":    "chore-laundry",
      "Bathroom":   "chore-bathroom",
      "Vacuum":     "chore-vacuum",
      "Trash":      "chore-trash",
      "Patio":      "chore-patio",
      "Cooking":    "chore-cooking",
    };

    const HABITS = {{ habits | safe }};

    const HABIT_CSS = {
      "Running":        "habit-run",
      "Yoga":           "habit-yoga",
      "Weights":        "habit-weights",
      "Sports":         "habit-sports",
      "Reading":        "habit-read",
      "No Alcohol":     "habit-noalc",
      "Drinking Water": "habit-water",
      "No Junk Food":   "habit-nojunk",
    };

    let currentTab = "chores";
    let currentDay      = localDateStr();
    let currentChore    = null;
    let isHabitMode     = false;
    let todayDone       = {};
    let todayCount      = {};
    let weeklyStats     = { players: {}, chores: {} };
    let choreStatus     = { firstRecordDate: null, chores: {} };
    let habitTodayCount = {};
    let habitWeekly     = { players: {} };

    // ---- Habit overlays ----
    async function openHabitTrophy() {
      var res   = await fetch('/api/habits/history');
      var items = await res.json();
      var now         = new Date();
      var monthStart  = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-01';
      var monthName   = now.toLocaleDateString('en-US', {month:'long'});
      var daysInMonth = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
      var thisMonth = items.filter(function(i) { return i.date >= monthStart; });
      var p1Count   = thisMonth.filter(function(i) { return i.person === P1; }).length;
      var p2Count   = thisMonth.filter(function(i) { return i.person === P2; }).length;
      var maxCount  = Math.max(p1Count, p2Count, 1);
      document.getElementById('habit-trophy-summary').innerHTML =
        '<div class="month-summary-title">' + monthName + ' — ' + daysInMonth + ' days</div>' +
        '<div class="month-summary-rows">' +
          '<div class="summary-row">' +
            '<div class="summary-name">' + P2 + '</div>' +
            '<div class="summary-bar-track"><div class="summary-bar bar-mg" style="width:' + (p2Count/maxCount*100) + '%"></div></div>' +
            '<div class="summary-count">' + p2Count + '</div>' +
          '</div>' +
          '<div class="summary-row">' +
            '<div class="summary-name">' + P1 + '</div>' +
            '<div class="summary-bar-track"><div class="summary-bar bar-jc" style="width:' + (p1Count/maxCount*100) + '%"></div></div>' +
            '<div class="summary-count">' + p1Count + '</div>' +
          '</div>' +
        '</div>';
      document.getElementById('habit-trophy-list').innerHTML = !items.length
        ? '<div class="entry-row" style="color:var(--muted)">No habits logged yet!</div>'
        : items.map(function(item) {
            return '<div class="entry-row">' +
              '<div class="entry-dot ' + (item.person===P2?'dot-mg':'dot-jc') + '"></div>' +
              '<div class="entry-person">' + item.person + '</div>' +
              '<div class="entry-chore">'  + item.habit  + '</div>' +
              '<div class="entry-date">'   + fmtDate(item.date) + '</div>' +
            '</div>';
          }).join('');
      document.getElementById('overlay-habit-trophy').classList.remove('hidden');
    }

    async function openHabitSettings() {
      await renderHabitSettings();
      document.getElementById('overlay-habit-settings').classList.remove('hidden');
    }

    async function renderHabitSettings() {
      var res   = await fetch('/api/habits/history');
      var items = await res.json();
      document.getElementById('habit-settings-list').innerHTML = !items.length
        ? '<div class="entry-row" style="color:var(--muted)">No habits logged yet!</div>'
        : items.map(function(item) {
            return '<div class="entry-row" id="habit-entry-' + item.id + '">' +
              '<div class="entry-dot ' + (item.person===P2?'dot-mg':'dot-jc') + '"></div>' +
              '<div class="entry-person">' + item.person + '</div>' +
              '<div class="entry-chore">'  + item.habit  + '</div>' +
              '<div class="entry-date">'   + fmtDate(item.date) + '</div>' +
              '<button class="btn-del" onclick="deleteHabitEntry(' + item.id + ')">X</button>' +
            '</div>';
          }).join('');
    }

    async function deleteHabitEntry(id) {
      var res = await fetch('/api/habits/' + id, {method:'DELETE'});
      if (res.ok) {
        var el = document.getElementById('habit-entry-' + id);
        if (el) el.remove();
        showToast('Entry removed');
        await loadAll();
        if (currentTab === 'habits') {
          renderHabitGrid();
          renderHabitWeeklyStrip();
        }
      }
    }

    // ---- Tab switching ----
    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach(function(el) {
        el.classList.toggle('tab-active', el.dataset.tab === tab);
      });
      if (tab === 'habits') {
        renderHabitWeeklyStrip();
        renderHabitGrid();
      } else {
        renderWeeklyStrip();
        renderChoreGrid();
      }
    }

    function openTrophyForTab() {
      if (currentTab === 'habits') openHabitTrophy();
      else openTrophy();
    }

    function openSettingsForTab() {
      if (currentTab === 'habits') openHabitSettings();
      else openSettings();
    }

    // ---- Date helpers ----
    function localDateStr() {
      const n = new Date();
      return n.getFullYear() + '-' +
        String(n.getMonth()+1).padStart(2,'0') + '-' +
        String(n.getDate()).padStart(2,'0');
    }

    function ordinal(n) {
      const s = ['th','st','nd','rd'], v = n % 100;
      return n + (s[(v-20)%10] || s[v] || s[0]);
    }

    function fmtDate(isoDate) {
      const [y,m,d] = isoDate.split('-').map(Number);
      const month = new Date(y,m-1,d).toLocaleDateString('en-US',{month:'short'});
      return month + '. ' + ordinal(d);
    }

    function timeLabel() {
      var now = new Date();
      var hh = String(now.getHours()).padStart(2,'0');
      var mm = String(now.getMinutes()).padStart(2,'0');
      return hh + ':' + mm;
    }

    function updateDateHeaders() {
      var label = fmtDate(localDateStr());
      var time  = timeLabel();
      ['hdr-date-home','hdr-date-select','today-date-txt'].forEach(function(id) {
        var el = document.getElementById(id);
        if (el) el.textContent = label;
      });
      ['hdr-time-home','hdr-time-select'].forEach(function(id) {
        var el = document.getElementById(id);
        if (el) el.textContent = time;
      });
    }

    // ---- Overdue helpers ----
    function isOverdue(choreName) {
      var threshold = CHORE_THRESHOLDS[choreName];
      if (!threshold) return false;
      var status = choreStatus.chores[choreName];
      if (!status) return false;
      if (status.daysSince !== null && status.daysSince !== undefined) {
        return status.daysSince >= threshold;
      }
      // Never logged — grace period from first-ever DB record
      if (!choreStatus.firstRecordDate) return false;
      var today = new Date();
      var first = new Date(choreStatus.firstRecordDate + 'T00:00:00');
      var daysSinceFirst = Math.floor((today - first) / 86400000);
      return daysSinceFirst >= threshold;
    }

    function overdueChipLabel(choreName) {
      var status = choreStatus.chores[choreName];
      if (!status) return '';
      if (status.daysSince !== null && status.daysSince !== undefined) {
        return status.daysSince + 'd ago';
      }
      return 'never';
    }

    // ---- Toast ----
    function showToast(msg) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(function() { t.classList.remove('show'); }, 2400);
    }

    // ---- Confetti ----
    function burst(cx, cy) {
      for (var i = 0; i < 24; i++) {
        var el = document.createElement('div');
        el.className = 'confetti-piece';
        el.style.cssText = 'left:' + (cx+(Math.random()-.5)*140) + 'px;' +
          'top:' + (cy+(Math.random()-.5)*80) + 'px;' +
          'background:' + CONFETTI_COLORS[Math.floor(Math.random()*CONFETTI_COLORS.length)] + ';' +
          'width:' + (5+Math.random()*8) + 'px;height:' + (5+Math.random()*8) + 'px;' +
          'animation-duration:' + (0.7+Math.random()*0.65) + 's;' +
          'animation-delay:' + (Math.random()*0.2) + 's;';
        document.body.appendChild(el);
        el.addEventListener('animationend', function() { el.remove(); });
      }
    }

    // ---- Load data ----
    async function loadAll() {
      var results = await Promise.all([
        fetch('/api/today'),
        fetch('/api/weekly'),
        fetch('/api/chore-status'),
        fetch('/api/habits/today'),
        fetch('/api/habits/weekly'),
      ]);
      var todayItems      = await results[0].json();
      weeklyStats         = await results[1].json();
      var statusData      = await results[2].json();
      var habitItems      = await results[3].json();
      var habitWeeklyData = await results[4].json();

      todayDone  = {};
      todayCount = {};
      todayItems.forEach(function(item) {
        todayDone[item.chore] = item;
        todayCount[item.chore] = (todayCount[item.chore] || 0) + 1;
      });

      choreStatus = { firstRecordDate: statusData.first_record_date, chores: {} };
      Object.keys(statusData.chores).forEach(function(name) {
        choreStatus.chores[name] = { daysSince: statusData.chores[name].days_since };
      });

      habitTodayCount = {};
      habitItems.forEach(function(item) {
        habitTodayCount[item.habit] = (habitTodayCount[item.habit] || 0) + 1;
      });

      habitWeekly = { players: habitWeeklyData.players || {} };
    }

    // ---- Render home ----
    function renderWeeklyStrip() {
      document.getElementById('score-p1').textContent = (weeklyStats.players && weeklyStats.players[P1]) || 0;
      document.getElementById('score-p2').textContent = (weeklyStats.players && weeklyStats.players[P2]) || 0;
    }

    function renderChoreGrid() {
      var grid = document.getElementById('chore-grid');
      grid.innerHTML = CHORES.map(function(c) {
        var done      = todayDone[c.name];
        var count     = todayCount[c.name] || 0;
        var isMulti   = MULTI_PER_DAY.has(c.name);
        var cssCls    = CHORE_CSS[c.name] || 'chore-litter';
        var weekCount = (weeklyStats.chores && weeklyStats.chores[c.name]) || 0;
        var weekLabel = weekCount > 0 ? (weekCount + 'x this week') : '';
        var overdue   = isOverdue(c.name);
        var topSlot;
        if (isMulti && count > 0) {
          // Multi-per-day: show how many times done today, still tappable
          topSlot = '<div class="chore-done-hero">&#10003; ' + count + 'x</div>';
        } else if (!isMulti && done) {
          // Once-per-day: show who did it
          topSlot = '<div class="chore-done-hero">&#10003; ' + done.person + '</div>';
        } else {
          topSlot = '<div class="chore-emoji">' + c.emoji + '</div>';
        }
        var chip = overdue ? '<div class="days-chip">' + overdueChipLabel(c.name) + '</div>' : '';
        return '<button class="btn-chore ' + cssCls + (overdue ? ' alert-glow' : '') + '" onclick="selectChore(\'' + c.name + '\')">' +
          chip +
          topSlot +
          '<div class="chore-name">' + c.name + '</div>' +
          '<div class="chore-week-count">' + weekLabel + '</div>' +
          '</button>';
      }).join('');
    }

    function renderHabitWeeklyStrip() {
      document.getElementById('score-p1').textContent = (habitWeekly.players && habitWeekly.players[P1]) || 0;
      document.getElementById('score-p2').textContent = (habitWeekly.players && habitWeekly.players[P2]) || 0;
    }

    function renderHabitGrid() {
      var grid = document.getElementById('chore-grid');
      grid.innerHTML = HABITS.map(function(h) {
        var count  = habitTodayCount[h.name] || 0;
        var cssCls = HABIT_CSS[h.name] || 'habit-run';
        var topSlot = count > 0
          ? '<div class="chore-done-hero">&#10003; ' + count + 'x</div>'
          : '<div class="chore-emoji">' + h.emoji + '</div>';
        var weekLabel = count > 0 ? (count + 'x today') : '';
        return '<button class="btn-chore ' + cssCls + '" onclick="selectHabit(\'' + h.name + '\')">' +
          topSlot +
          '<div class="chore-name">' + h.name + '</div>' +
          '<div class="chore-week-count">' + weekLabel + '</div>' +
        '</button>';
      }).join('');
    }

    // ---- Frames ----
    function showHome() {
      cancelFrame2();
      if (currentTab === 'habits') {
        renderHabitWeeklyStrip();
        renderHabitGrid();
      } else {
        renderWeeklyStrip();
        renderChoreGrid();
      }
      document.getElementById('frame-home').classList.remove('hidden');
      document.getElementById('frame-select').classList.add('hidden');
      document.getElementById('frame-today').classList.add('hidden');
    }

    function selectChore(name) {
      isHabitMode = false;
      var done    = todayDone[name];
      var isMulti = MULTI_PER_DAY.has(name);
      if (done && !isMulti) {
        showFrame2(name, done);
        return;
      }
      currentChore = name;
      var chore = CHORES.find(function(c) { return c.name === name; });
      document.getElementById('chore-header-label').textContent =
        chore ? (chore.emoji + ' ' + chore.name) : name;
      document.getElementById('frame-home').classList.add('hidden');
      document.getElementById('frame-select').classList.remove('hidden');
      document.getElementById('frame-today').classList.add('hidden');
    }

    function selectHabit(name) {
      isHabitMode  = true;
      currentChore = name;
      var habit = HABITS.find(function(h) { return h.name === name; });
      document.getElementById('chore-header-label').textContent =
        habit ? (habit.emoji + ' ' + habit.name) : name;
      document.getElementById('frame-home').classList.add('hidden');
      document.getElementById('frame-select').classList.remove('hidden');
      document.getElementById('frame-today').classList.add('hidden');
    }

    function showFrame2(choreName, data) {
      cancelFrame2();
      var p = data.person;

      var chip = document.getElementById('avatar-chip');
      chip.textContent = p[0];
      chip.className = 'avatar-chip ' + (p === P2 ? 'chip-mg' : 'chip-jc');

      var item = CHORES.find(function(c) { return c.name === choreName; }) ||
                 HABITS.find(function(h) { return h.name === choreName; });
      document.getElementById('chore-tag').textContent = item ? (item.emoji + ' ' + item.name) : choreName;
      document.getElementById('winner-name').textContent = p;

      var streakEl = document.getElementById('streak-line');
      if (data.streak >= 1) {
        streakEl.textContent = '🔥 ' + data.streak + ' day streak';
        streakEl.style.display = '';
      } else {
        streakEl.style.display = 'none';
      }

      document.getElementById('monthly-line').textContent = data.monthly !== undefined
        ? (data.monthly + '/' + data.days_in_month + ' times in ' + data.month_name)
        : '';

      document.getElementById('sad-initials').textContent = '(' + (p === P1 ? P2 : P1) + ')';

      document.getElementById('frame-home').classList.add('hidden');
      document.getElementById('frame-select').classList.add('hidden');
      document.getElementById('frame-today').classList.remove('hidden');

      startFrame2Countdown();
    }

    // ---- Frame 2 countdown (10s auto-return) ----
    var frame2Timer = null;

    function startFrame2Countdown() {
      var bar = document.getElementById('return-bar');
      bar.style.transition = 'none';
      bar.style.width = '100%';
      bar.getBoundingClientRect();
      bar.style.transition = 'width 10s linear';
      bar.style.width = '0%';
      frame2Timer = setTimeout(goHome, 10000);
    }

    function cancelFrame2() {
      clearTimeout(frame2Timer);
      frame2Timer = null;
    }

    async function goHome() {
      await loadAll();
      showHome();
    }

    // ---- Record a chore or habit ----
    async function recordClean(person, btn) {
      if (!currentChore) return;
      var rect = btn.getBoundingClientRect();

      if (isHabitMode) {
        var res = await fetch('/api/habits/log', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ person: person, habit: currentChore })
        });
        if (res.ok) {
          var data = await res.json();
          habitTodayCount[currentChore] = (habitTodayCount[currentChore] || 0) + 1;
          if (habitWeekly.players) habitWeekly.players[person] = (habitWeekly.players[person] || 0) + 1;
          burst(rect.left + rect.width/2, rect.top + rect.height/3);
          showToast('Logged for ' + person + '!');
          showFrame2(currentChore, data);
        } else {
          showToast('Something went wrong');
        }
        return;
      }

      var res = await fetch('/api/clean', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ person: person, chore: currentChore })
      });
      if (res.ok) {
        var data = await res.json();
        todayDone[currentChore]  = data;
        todayCount[currentChore] = (todayCount[currentChore] || 0) + 1;
        if (weeklyStats.players) weeklyStats.players[person] = (weeklyStats.players[person] || 0) + 1;
        if (weeklyStats.chores)  weeklyStats.chores[currentChore] = (weeklyStats.chores[currentChore] || 0) + 1;
        burst(rect.left + rect.width/2, rect.top + rect.height/3);
        showToast('Logged for ' + person + '!');
        showFrame2(currentChore, data);
      } else if (res.status === 409) {
        showToast('Already logged today!');
        await loadAll();
        showHome();
      } else {
        showToast('Something went wrong');
      }
    }

    // ---- Trophy overlay ----
    async function openTrophy() {
      var res = await fetch('/api/history');
      var items = await res.json();

      var now = new Date();
      var monthStart = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-01';
      var monthName = now.toLocaleDateString('en-US', {month:'long'});
      var daysInMonth = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();

      var thisMonth = items.filter(function(i) { return i.date >= monthStart; });
      var p1Count = thisMonth.filter(function(i) { return i.person === P1; }).length;
      var p2Count = thisMonth.filter(function(i) { return i.person === P2; }).length;
      var maxCount = Math.max(p1Count, p2Count, 1);

      document.getElementById('trophy-summary').innerHTML =
        '<div class="month-summary-title">' + monthName + ' — ' + daysInMonth + ' days</div>' +
        '<div class="month-summary-rows">' +
          '<div class="summary-row">' +
            '<div class="summary-name">' + P2 + '</div>' +
            '<div class="summary-bar-track"><div class="summary-bar bar-mg" style="width:' + (p2Count/maxCount*100) + '%"></div></div>' +
            '<div class="summary-count">' + p2Count + '</div>' +
          '</div>' +
          '<div class="summary-row">' +
            '<div class="summary-name">' + P1 + '</div>' +
            '<div class="summary-bar-track"><div class="summary-bar bar-jc" style="width:' + (p1Count/maxCount*100) + '%"></div></div>' +
            '<div class="summary-count">' + p1Count + '</div>' +
          '</div>' +
        '</div>';

      var list = document.getElementById('trophy-list');
      list.innerHTML = !items.length
        ? '<div class="entry-row" style="color:var(--muted)">No chores yet!</div>'
        : items.map(function(item) {
            return '<div class="entry-row">' +
              '<div class="entry-dot ' + (item.person===P2?'dot-mg':'dot-jc') + '"></div>' +
              '<div class="entry-person">' + item.person + '</div>' +
              '<div class="entry-chore">' + item.chore + '</div>' +
              '<div class="entry-date">' + fmtDate(item.date) + '</div>' +
            '</div>';
          }).join('');

      document.getElementById('overlay-trophy').classList.remove('hidden');
    }

    // ---- Settings overlay ----
    async function openSettings() {
      await renderSettings();
      document.getElementById('overlay-settings').classList.remove('hidden');
    }

    async function renderSettings() {
      var res = await fetch('/api/history');
      var items = await res.json();
      var list = document.getElementById('settings-list');
      list.innerHTML = !items.length
        ? '<div class="entry-row" style="color:var(--muted)">No chores yet!</div>'
        : items.map(function(item) {
            return '<div class="entry-row" id="entry-' + item.id + '">' +
              '<div class="entry-dot ' + (item.person===P2?'dot-mg':'dot-jc') + '"></div>' +
              '<div class="entry-person">' + item.person + '</div>' +
              '<div class="entry-chore">' + item.chore + '</div>' +
              '<div class="entry-date">' + fmtDate(item.date) + '</div>' +
              '<button class="btn-del" onclick="deleteEntry(' + item.id + ')">X</button>' +
            '</div>';
          }).join('');
    }

    async function deleteEntry(id) {
      var res = await fetch('/api/clean/' + id, {method:'DELETE'});
      if (res.ok) {
        var el = document.getElementById('entry-' + id);
        if (el) el.remove();
        showToast('Entry removed');
        await loadAll();
        renderChoreGrid();
        renderWeeklyStrip();
      }
    }

    function closeOverlay(id) {
      document.getElementById(id).classList.add('hidden');
    }

    document.getElementById('overlay-trophy').addEventListener('click', function(e) {
      if (e.target === this) closeOverlay('overlay-trophy');
    });
    document.getElementById('overlay-settings').addEventListener('click', function(e) {
      if (e.target === this) closeOverlay('overlay-settings');
    });
    document.getElementById('overlay-habit-trophy').addEventListener('click', function(e) {
      if (e.target === this) closeOverlay('overlay-habit-trophy');
    });
    document.getElementById('overlay-habit-settings').addEventListener('click', function(e) {
      if (e.target === this) closeOverlay('overlay-habit-settings');
    });

    // ---- Reset ----
    var resetMode = 'chores';

    function confirmReset() {
      resetMode = 'chores';
      document.getElementById('modal-confirm-text').textContent = 'All chore records will be deleted permanently.';
      document.getElementById('modal-confirm').classList.remove('hidden');
    }

    function confirmHabitReset() {
      resetMode = 'habits';
      document.getElementById('modal-confirm-text').textContent = 'All habit records will be deleted permanently.';
      document.getElementById('modal-confirm').classList.remove('hidden');
    }

    function closeConfirm() { document.getElementById('modal-confirm').classList.add('hidden'); }

    async function doReset() {
      closeConfirm();
      if (resetMode === 'habits') {
        closeOverlay('overlay-habit-settings');
        var res = await fetch('/api/habits/reset', {method:'POST'});
        if (res.ok) {
          habitTodayCount = {};
          habitWeekly = { players: {} };
          showToast('Habit scores cleared!');
          showHome();
        }
      } else {
        closeOverlay('overlay-settings');
        var res = await fetch('/api/reset', {method:'POST'});
        if (res.ok) {
          todayDone = {};
          weeklyStats = { players: {}, chores: {} };
          showToast('Scores cleared!');
          showHome();
        }
      }
    }

    // ---- Midnight check ----
    setInterval(async function() {
      var newDay = localDateStr();
      if (newDay !== currentDay) {
        currentDay = newDay;
        updateDateHeaders();
        await loadAll();
        showHome();
      }
    }, 60000);

    // ============================================================
    // SLEEP / SCREENSAVER
    // ============================================================
    var SLEEP_MS   = 120000;
    var sleepEl    = document.getElementById('sleep-overlay');
    var sleepDay   = document.getElementById('sleep-day');
    var sleepNight = document.getElementById('sleep-night');
    var sleepTimer = null;
    var bounceItems = [];
    var bounceTimer = null;

    function isNight() {
      var h = new Date().getHours();
      return h >= 23 || h < 7;
    }

    function updateNightClock() {
      var now = new Date();
      var hh = String(now.getHours()).padStart(2,'0');
      var mm = String(now.getMinutes()).padStart(2,'0');
      document.getElementById('sleep-time-night').textContent = hh + ':' + mm;
      document.getElementById('sleep-date-night').textContent = fmtDate(localDateStr());
    }

    // -- Bouncing emojis --
    function initBounceEmojis() {
      sleepDay.innerHTML = '';
      bounceItems = [];
      var size = Math.max(40, Math.round(window.innerWidth * 0.12));
      CHORES.forEach(function(c) {
        var el = document.createElement('div');
        el.className = 'bounce-emoji';
        el.textContent = c.emoji;
        sleepDay.appendChild(el);
        bounceItems.push({
          el: el,
          size: size,
          x: Math.random() * Math.max(1, window.innerWidth - size),
          y: Math.random() * Math.max(1, window.innerHeight - size),
          vx: (1.2 + Math.random() * 0.8) * (Math.random() > 0.5 ? 1 : -1),
          vy: (1.2 + Math.random() * 0.8) * (Math.random() > 0.5 ? 1 : -1),
        });
      });
    }

    function stepBounce() {
      var W = window.innerWidth, H = window.innerHeight;
      bounceItems.forEach(function(b) {
        b.x += b.vx;
        b.y += b.vy;
        if (b.x <= 0)        { b.vx =  Math.abs(b.vx); b.x = 0; }
        if (b.x >= W-b.size) { b.vx = -Math.abs(b.vx); b.x = W-b.size; }
        if (b.y <= 0)        { b.vy =  Math.abs(b.vy); b.y = 0; }
        if (b.y >= H-b.size) { b.vy = -Math.abs(b.vy); b.y = H-b.size; }
        b.el.style.left = b.x + 'px';
        b.el.style.top  = b.y + 'px';
      });
    }

    function startBounce() {
      (function tick() {
        stepBounce();
        bounceTimer = setTimeout(function() { requestAnimationFrame(tick); }, 80);
      })();
    }

    function stopBounce() {
      clearTimeout(bounceTimer);
      bounceTimer = null;
    }

    // -- Activate / deactivate --
    function activateSleep() {
      var night = isNight();
      if (night) {
        stopBounce();
        sleepDay.style.display   = 'none';
        sleepNight.style.display = 'flex';
        updateNightClock();
      } else {
        sleepNight.style.display = 'none';
        sleepDay.style.display   = 'block';
        initBounceEmojis();
        startBounce();
      }
      sleepEl.classList.add('show');
    }

    function deactivateSleep() {
      sleepEl.classList.remove('show');
      stopBounce();
    }

    function resetSleep() {
      clearTimeout(sleepTimer);
      sleepTimer = setTimeout(activateSleep, SLEEP_MS);
    }

    // Re-evaluate day/night every minute while sleeping
    setInterval(function() {
      if (!sleepEl.classList.contains('show')) return;
      var night = isNight();
      var currentlyNight = sleepNight.style.display === 'flex';
      if (night === currentlyNight) {
        if (night) updateNightClock();
        return;
      }
      if (night) {
        stopBounce();
        sleepDay.style.display   = 'none';
        sleepNight.style.display = 'flex';
        updateNightClock();
      } else {
        sleepNight.style.display = 'none';
        sleepDay.style.display   = 'block';
        initBounceEmojis();
        startBounce();
      }
    }, 60000);

    sleepEl.addEventListener('touchstart', function(e) {
      if (sleepEl.classList.contains('show')) {
        e.preventDefault();
        e.stopPropagation();
        deactivateSleep();
        resetSleep();
      }
    }, { passive: false });

    sleepEl.addEventListener('click', function() {
      if (sleepEl.classList.contains('show')) {
        deactivateSleep();
        resetSleep();
      }
    });

    document.addEventListener('touchstart', resetSleep, { passive: true });
    document.addEventListener('click', resetSleep);

    // ---- Boot ----
    updateDateHeaders();
    resetSleep();
    loadAll().then(function() { showHome(); });
    setInterval(updateDateHeaders, 60000);
  </script>
</body>
</html>
